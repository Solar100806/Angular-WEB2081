<h2 class="text-xl">Thêm truyện tranh</h2>

<div *ngIf="success" style="color: green; font-weight: bold; margin-bottom: 10px;">
  {{ success }}
</div>
<div *ngIf="error" style="color: red; font-weight: bold; margin-bottom: 10px;">
  {{ error }}
</div>
<div *ngIf="loading">Đang xử lý...</div>

<form [formGroup]="addForm" (ngSubmit)="submitForm()">
  <div>
    <label>Tên truyện</label>
    <input type="text" formControlName="title" />
  </div>
  <div>
    <label>Tác giả</label>
    <input type="text" formControlName="author" />
  </div>
  <div>
    <label>Lượt xem</label>
    <input type="number" formControlName="views" />
  </div>
  <button type="submit" [disabled]="loading">Thêm truyện</button>
</form>
