<div *ngIf="isLoading" class="loading">Đang tải dữ liệu từ server...</div>
<div *ngIf="isError" class="error" style="color: red;">Có lỗi xảy ra khi lấy dữ liệu!</div>

<table *ngIf="!isLoading && !isError" border="1" style="width: 100%; text-align: left;">
  <thead>
    <tr>
      <th>ID</th>
      <th>Tiêu đề (Title)</th>
      <th>Lượt xem (Views)</th>
      <th>Đánh giá</th>
      <th>Hành động</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let story of stories">
      <td>{{ story.id }}</td>
      <td>{{ story.title }}</td>
      <td>{{ story.views }}</td>
      
      <td>
        <span *ngIf="story.views > 90000" style="color: red; font-weight: bold;">
          🔥 HOT
        </span>
      </td>
      
      <td>
        <button 
          (click)="deleteItem(story.id)" 
          [disabled]="deletingId === story.id">
          {{ deletingId === story.id ? 'Đang xóa...' : 'Xóa' }}
        </button>
      </td>
    </tr>
  </tbody>
</table>
