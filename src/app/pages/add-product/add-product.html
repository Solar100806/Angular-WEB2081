<div class="max-w-md mx-auto mt-10 p-6 bg-white rounded-lg shadow-md">
  <h2 class="text-2xl font-bold text-gray-800 mb-6 border-b pb-2">Thêm sản phẩm mới</h2>

  @if (success) {
    <div class="mb-4 p-3 bg-green-100 text-green-700 rounded-md border border-green-200 animate-pulse">
      {{ success }}
    </div>
  }
  @if (error) {
    <div class="mb-4 p-3 bg-red-100 text-red-700 rounded-md border border-red-200">
      {{ error }}
    </div>
  }

  <form [formGroup]="addForm" (ngSubmit)="submitForm()" class="space-y-4">
    <div class="flex flex-col">
      <label class="text-sm font-semibold text-gray-600 mb-1">Tên sản phẩm</label>
      <input type="text" formControlName="name" placeholder="Nhập tên sản phẩm..." 
             class="form-input" />
    </div>

    <div class="flex flex-col">
      <label class="text-sm font-semibold text-gray-600 mb-1">Giá bán</label>
      <input type="number" formControlName="price" placeholder="0.00"
             class="form-input" />
    </div>

    <button type="submit" [disabled]="loading"
            class="w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-md transition duration-300 disabled:bg-gray-400 disabled:cursor-not-allowed flex justify-center items-center">
      @if (loading) {
        <span class="loader mr-2"></span> Đang xử lý...
      } @else {
        Thêm sản phẩm
      }
    </button>
  </form>
</div>
